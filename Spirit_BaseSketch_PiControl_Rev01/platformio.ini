; PlatformIO project configuration for the Spirit Rover on-board Arduino.
;
; Target microcontroller: ATmega328P @ 8 MHz / 3.3V (Arduino Pro Mini class).
; This is confirmed by the firmware's direct register use (Timer1 TCCR1A/B,
; ICR1, OCR1B; hardware SPI slave via SPCR/SPDR/SPE) and the 8 MHz Timer1
; prescaler comments in Hardware.ino.
;
; The existing multi-file .ino sketch is built in place: `src_dir = .` tells
; PlatformIO to treat this folder as the source directory, and it concatenates
; the .ino tabs and auto-generates prototypes exactly like the Arduino IDE, so
; no source files need to be renamed or restructured for this first pass.
;
; NOTE: This firmware depends on a vendored "RingoWire" I2C library
; (#include <RingoWire.h>). It is not bundled in this repo. Place its source in
;   lib/RingoWire/
; (a `RingoWire.h` / `RingoWire.cpp` pair) so PlatformIO's Library Dependency
; Finder can pick it up. Until then a full build will fail to link.

[platformio]
; Make PlatformIO build the in-place .ino sketch tabs.
src_dir = .

[env:pro8MHzatmega328]
platform = atmelavr
board = pro8MHzatmega328
framework = arduino

; Pin third-party libraries for reproducible builds.
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

; Build settings. f_cpu is already implied by the board, but pinned here for
; clarity since the firmware's timing math assumes an 8 MHz core.
board_build.f_cpu = 8000000L

build_flags =
    -Wall

; Upload via an ISP/serial adapter as appropriate for your wiring.
; upload_protocol = arduino
; upload_speed = 57600
